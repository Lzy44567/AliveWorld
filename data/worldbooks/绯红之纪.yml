entries:
- content: 极端狂热的武装教士，全副重甲，使用神圣火焰。他们追踪腐败的踪迹，一旦发现感染者，会立刻封锁城镇并执行焦土政策。
  keys: 教廷, 审判官, 圣职者
  name: 异端审判庭
- content: 隐藏在暗处的疯子，认为腐败是神的恩赐（进化）。他们喜欢暗中观察并测试那些成功融合了腐败力量的“完美宿主”。
  keys: ' 邪教, 面具, 猩红'
  name: 猩红秘教
global_setting: 这是一个被严酷神权统治的暗黑奇幻世界。名为“绯红腐败”的活体能量结晶正在吞噬大地，感染者会发生恐怖的血肉变异。教廷组建了冷酷的“异端审判庭”到处清洗感染者，宁可屠城绝不放过一个；而暗中则有邪教崇拜这股力量。世界充满猜忌、疯狂与绝望。
name: 绯红之纪
starting_scene: 雨夜，泥泞的边境。你步入了一座名为‘黑水镇’的偏僻聚居地。你的右臂隐隐作痛，暗红色的晶体在斗篷下散发着微光。你推开酒馆嘎吱作响的木门，冷风灌入，原本喧闹的佣兵们瞬间安静，所有目光集中在你这个陌生人身上。你敏锐地注意到，角落里一个戴着乌鸦面具的黑袍人正死死盯着你的右臂。
