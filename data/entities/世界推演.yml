name: 世界推演
description: 依据世界书、近期剧情与既有暗流，让世界在玩家视野之外自然演化的系统型实体。它不是天道、世界意志或最终反派。
motive: 在世界书规则约束下推动长期且可信的世界变化，并为未来剧情保留可触发的因果。
status: 低强度运行，观察当前故事规模与世界书复杂度。
